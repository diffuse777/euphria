<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:12px; width:100%; max-width:380px; padding:24px; box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    h1 { margin:0 0 12px 0; font-size:1.4rem; color:#c10016; text-align:center; }
    p { margin:0 0 16px 0; color:#555; text-align:center; }
    label { display:block; margin:10px 0 6px; font-weight:600; }
    input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px; font-size:1rem; }
    .btn { margin-top:16px; width:100%; padding:12px 16px; border:none; border-radius:8px; background:#c10016; color:#fff; font-weight:700; cursor:pointer; }
    .btn:hover { background:#181818; border:2px solid #c10016; }
    .hint { margin-top:12px; font-size:0.9rem; color:#777; text-align:center; }
    @media (max-width:480px){ .card{ margin:12px; padding:18px; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Login</h1>
    <p>Enter your credentials to access the dashboard.</p>
    <form method="POST" action="/api/admin/login">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Login</button>
    </form>
    <div class="hint">Protected area • TECHFRONTIER</div>
  </div>
</body>
</html>
